---
- name: Provision host
  hosts: all
  become: true
  gather_facts: true

  vars:
    sites_available: "{{ lookup('file', playbook_dir + '/../sites-available.json') | from_json }}"
    wordpress_prefix: "wp_"
    database_prefix: "db_"

  pre_tasks:
    - name: Capture SSH user
      ansible.builtin.set_fact:
        ssh_user: "{{ ansible_user }}"

  tasks:
    - name: System
      ansible.builtin.import_tasks: tasks/system.yml
    - name: Users
      ansible.builtin.import_tasks: tasks/users.yml
    - name: Docker
      ansible.builtin.import_tasks: tasks/docker.yml
