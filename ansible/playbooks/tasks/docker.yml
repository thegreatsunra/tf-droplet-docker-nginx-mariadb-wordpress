---
- name: Add Docker GPG key
  ansible.builtin.shell: |
    wget -O- https://download.docker.com/linux/debian/gpg | \
    gpg --dearmor | \
    tee /usr/share/keyrings/docker.gpg > /dev/null
  args:
    creates: /usr/share/keyrings/docker.gpg

- name: Add Docker apt repository
  ansible.builtin.apt_repository:
    repo: >-
      deb [arch={{ ansible_architecture }}
      signed-by=/usr/share/keyrings/docker.gpg]
      https://download.docker.com/linux/{{ ansible_distribution | lower }}
      {{ ansible_lsb.codename }} stable
    filename: docker
    state: present

- name: Install Docker
  ansible.builtin.apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-compose-plugin
    state: present
    update_cache: true

- name: Create docker directory structure
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ ssh_user }}"
    group: "{{ ssh_user }}"
    mode: "0755"
  loop:
    - "/home/{{ ssh_user }}/docker"
    - "/home/{{ ssh_user }}/docker/nginx"
    - "/home/{{ ssh_user }}/docker/nginx/conf.d"
    - "/home/{{ ssh_user }}/docker/nginx/conf.d/modules"

- name: Render docker-compose.yml
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "/home/{{ ssh_user }}/docker/docker-compose.yml"
    owner: "{{ ssh_user }}"
    group: "{{ ssh_user }}"
    mode: "0644"

- name: Render nginx default.conf
  ansible.builtin.template:
    src: nginx/conf.d/default.conf.j2
    dest: "/home/{{ ssh_user }}/docker/nginx/conf.d/default.conf"
    owner: "{{ ssh_user }}"
    group: "{{ ssh_user }}"
    mode: "0644"

- name: Deploy nginx module configs
  ansible.builtin.copy:
    src: "nginx/conf.d/modules/{{ item }}"
    dest: "/home/{{ ssh_user }}/docker/nginx/conf.d/modules/{{ item }}"
    owner: "{{ ssh_user }}"
    group: "{{ ssh_user }}"
    mode: "0644"
  loop:
    - general.conf
    - php.conf
    - security.conf
    - wordpress.conf
    - wordpress-multisite.conf

- name: Download certbot SSL options
  ansible.builtin.get_url:
    url: https://raw.githubusercontent.com/certbot/certbot/master/certbot-nginx/certbot_nginx/_internal/tls_configs/options-ssl-nginx.conf
    dest: "/home/{{ ssh_user }}/docker/nginx/conf.d/options-ssl-nginx.conf"
    owner: "{{ ssh_user }}"
    group: "{{ ssh_user }}"
    mode: "0644"

- name: Deploy docker .env
  ansible.builtin.copy:
    src: docker.env
    dest: "/home/{{ ssh_user }}/docker/.env"
    owner: "{{ ssh_user }}"
    group: "{{ ssh_user }}"
    mode: "0600"

- name: Pull Docker images
  ansible.builtin.command:
    cmd: "docker compose --file /home/{{ ssh_user }}/docker/docker-compose.yml pull"
  changed_when: true
