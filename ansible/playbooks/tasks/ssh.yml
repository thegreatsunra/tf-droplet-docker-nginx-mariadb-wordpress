---
- name: Back up original SSH config
  ansible.builtin.copy:
    src: /etc/ssh/sshd_config
    dest: /etc/ssh/_sshd_config.original
    remote_src: true
    force: false
    mode: "0600"

- name: Stop fail2ban before SSH changes
  ansible.builtin.service:
    name: fail2ban
    state: stopped

- name: Harden SSH configuration
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: "{{ item.regexp }}"
    line: "{{ item.line }}"
    state: present
  loop:
    - regexp: '^#?Port'
      line: 'Port 4444'
    - regexp: '^#?PasswordAuthentication'
      line: 'PasswordAuthentication no'
    - regexp: '^#?PermitEmptyPasswords'
      line: 'PermitEmptyPasswords no'
    - regexp: '^#?TCPKeepAlive'
      line: 'TCPKeepAlive no'
    - regexp: '^#?PermitRootLogin'
      line: 'PermitRootLogin no'
    - regexp: '^#?LogLevel'
      line: 'LogLevel VERBOSE'
    - regexp: '^#?X11Forwarding'
      line: 'X11Forwarding no'
    - regexp: '^#?AllowTcpForwarding'
      line: 'AllowTcpForwarding no'
    - regexp: '^#?AllowAgentForwarding'
      line: 'AllowAgentForwarding no'
    - regexp: '^#?MaxSessions'
      line: 'MaxSessions 2'
    - regexp: '^#?MaxAuthTries'
      line: 'MaxAuthTries 2'
    - regexp: '^#?ClientAliveCountMax'
      line: 'ClientAliveCountMax 2'
    - regexp: '^#?Compression'
      line: 'Compression no'
  notify: Restart SSH

- name: Restrict SSH access to deploy user
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    line: "AllowUsers {{ ssh_user }}"
    state: present
  notify: Restart SSH

- name: Start fail2ban after SSH changes
  ansible.builtin.service:
    name: fail2ban
    state: started
