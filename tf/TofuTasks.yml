version: "3"

tasks:
  apply:
    dir: "{{.TASKFILE_DIR}}"
    cmds:
      - tofu apply {{.CLI_ARGS}}

  destroy:
    dir: "{{.TASKFILE_DIR}}"
    cmds:
      - tofu destroy {{.CLI_ARGS}}

  fmt:
    dir: "{{.TASKFILE_DIR}}"
    cmds:
      - tofu fmt .

  init:
    dir: "{{.TASKFILE_DIR}}"
    cmds:
      - tofu init {{.CLI_ARGS}}

  plan:
    dir: "{{.TASKFILE_DIR}}"
    cmds:
      - tofu plan {{.CLI_ARGS}}

  providers-lock:
    dir: "{{.TASKFILE_DIR}}"
    cmds:
      - |
        tofu providers lock \
        -platform=darwin_amd64 \
        -platform=darwin_arm64 \
        -platform=linux_amd64

  validate:
    dir: "{{.TASKFILE_DIR}}"
    cmds:
      - tofu validate
